apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kinetiq
  namespace: kinetiq-develop
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: develop.kinetiq.scesi.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kinetiq
                port:
                  number: 80
  tls:
    - hosts:
        - develop.kinetiq.scesi.dev
      secretName: kinetiq-develop-tls-secret